<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Present Simple CRM — Бердичів 3.0</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #FDF5F6;
  --bg2: #FAE8EC;
  --bg3: #F5D5DC;
  --card: #FFFFFF;
  --border: #F0D0D5;
  --border2: #E8B8C0;
  --text: #2C1A1A;
  --text2: #7A4A50;
  --text3: #B89098;
  --green: #1A9B6C;
  --green-bg: #E6F5EF;
  --red: #C0392B;
  --red-bg: #FDECEA;
  --red2: #E74C3C;
  --blue: #2D6FD4;
  --blue-bg: #EAF0FB;
  --amber: #C4961E;
  --amber-bg: #FDF8EC;
  --pink: #E8A0B0;
  --pink-bg: #FDF0F3;
  --pink-mid: #F5C6D0;
  --yellow: #C8A840;
  --yellow-bg: #FDF8EC;
  --yellow-mid: #F0E4B8;
  --purple: #6B4EAA;
  --purple-bg: #F0EBFB;
  --r: 10px;
  --r2: 14px;
  --sh: 0 2px 8px rgba(192,57,43,.07), 0 1px 2px rgba(192,57,43,.04);
  --sh2: 0 4px 20px rgba(192,57,43,.10), 0 2px 6px rgba(192,57,43,.06);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Manrope', sans-serif; font-size: 14px; color: var(--text); background: var(--bg); min-height: 100vh; }

/* ─── LOGIN ─── */
.login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; background: linear-gradient(135deg, #FDF5F6 0%, #FAE8EC 50%, #FDF8EC 100%); }
.lbox { width: 100%; max-width: 360px; }
.lbox-logo { text-align: center; margin-bottom: 28px; }
.lbox-logo .emoji { font-size: 52px; display: block; margin-bottom: 8px; }
.lbox-logo h1 { font-size: 22px; font-weight: 700; letter-spacing: -.4px; }
.lbox-logo p { font-size: 13px; color: var(--text2); margin-top: 3px; }
.lcard { background: var(--card); border-radius: var(--r2); border: 1px solid var(--border); box-shadow: var(--sh2); padding: 24px; border-top: 3px solid var(--red); }
.role-grid { display: grid; gap: 10px; margin-bottom: 20px; }
.rcard { border: 1.5px solid var(--border); border-radius: var(--r); padding: 14px 16px; cursor: pointer; background: var(--card); display: flex; align-items: center; gap: 14px; transition: all .18s; }
.rcard:hover { border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-bg); }
.rcard.sel-owner { border-color: var(--red); box-shadow: 0 0 0 3px var(--red-bg); }
.rcard.sel-admin { border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-bg); }
.rcard .ico { font-size: 26px; flex-shrink: 0; }
.rcard h3 { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
.rcard p { font-size: 11px; color: var(--text2); }
.pin-label { font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
.pin-row { display: flex; gap: 10px; justify-content: center; margin-bottom: 10px; }
.pin-row input { width: 52px; height: 52px; text-align: center; font-size: 22px; font-weight: 700; border: 1.5px solid var(--border); border-radius: var(--r); background: var(--bg); color: var(--text); transition: border-color .15s; font-family: 'Manrope', sans-serif; }
.pin-row input:focus { outline: none; border-color: var(--blue); background: #fff; }
.perr { font-size: 12px; color: var(--red); min-height: 18px; margin-bottom: 6px; text-align: center; }
.btn-login { width: 100%; padding: 12px; font-size: 14px; font-weight: 700; background: linear-gradient(135deg, var(--red), #9B2335); color: #fff; border: none; border-radius: var(--r); cursor: pointer; font-family: 'Manrope', sans-serif; transition: all .15s; letter-spacing: .02em; box-shadow: 0 4px 15px rgba(192,57,43,.3); }
.btn-login:hover { opacity: .9; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(192,57,43,.4); }
.hint { font-size: 11px; color: var(--text3); margin-top: 12px; text-align: center; }

/* ─── LAYOUT ─── */
.h { display: none !important; }
.app-wrap { max-width: 100%; margin: 0 auto; padding: 0 12px 40px; }
.topbar { display: flex; align-items: center; justify-content: space-between; padding: 14px 0 12px; border-bottom: 2px solid var(--pink-mid); margin-bottom: 16px; }
.topbar-left { display: flex; align-items: center; gap: 10px; }
.topbar-logo { font-size: 20px; }
.topbar-title { font-size: 16px; font-weight: 700; letter-spacing: -.3px; }
.topbar-right { display: flex; align-items: center; gap: 8px; }
.badge { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
.badge-owner { background: var(--red-bg); color: var(--red); }
.badge-admin { background: var(--pink-bg); color: var(--red); }
.month-badge { background: var(--yellow-bg); color: var(--yellow); cursor: pointer; border: 1px solid transparent; transition: .15s; }
.month-badge:hover { border-color: var(--yellow); }
.btn-out { font-size: 12px; padding: 5px 12px; border: 1px solid var(--border2); border-radius: var(--r); background: none; cursor: pointer; color: var(--text2); font-family: 'Manrope', sans-serif; font-weight: 500; transition: .15s; }
.btn-out:hover { background: var(--bg2); }

/* ─── TABS ─── */
.tabs-wrap { margin-bottom: 16px; }
.tabs { display: flex; gap: 3px; flex-wrap: wrap; padding-bottom: 4px; }
.tabs::-webkit-scrollbar { display: none; }
.tab { padding: 6px 10px; font-size: 11px; font-weight: 600; cursor: pointer; border: none; background: none; color: var(--text2); border-radius: var(--r); transition: .15s; white-space: nowrap; font-family: 'Manrope', sans-serif; }
.tab:hover { background: var(--bg2); color: var(--text); }
.tab.on { background: linear-gradient(135deg, var(--red), #9B2335); color: #fff; box-shadow: 0 2px 8px rgba(192,57,43,.3); }

/* ─── CARDS / METRICS ─── */
.mets { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 8px; margin-bottom: 16px; }
.met { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); padding: 12px 14px; box-shadow: var(--sh); border-left: 3px solid var(--pink-mid); }
.met-label { font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 4px; }
.met-val { font-size: 20px; font-weight: 700; letter-spacing: -.5px; }
.met-sub { font-size: 11px; color: var(--text2); margin-top: 2px; }
.gn { color: var(--green); } .rd { color: var(--red); } .am { color: var(--amber); } .bl { color: var(--blue); } .pu { color: var(--purple); }

/* ─── SECTION CARD ─── */
.sc { background: var(--card); border: 1px solid var(--border); border-radius: var(--r2); padding: 16px; margin-bottom: 12px; box-shadow: var(--sh); }
.sc-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.sc-title { font-size: 11px; font-weight: 700; color: var(--red); text-transform: uppercase; letter-spacing: .08em; }

/* ─── PROGRESS BAR ─── */
.bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.bar-label { width: 110px; font-size: 11px; color: var(--text2); flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.bar-track { flex: 1; height: 8px; background: var(--bg2); border-radius: 99px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 99px; transition: width .5s ease; }
.bar-val { font-size: 11px; color: var(--text2); width: 80px; text-align: right; flex-shrink: 0; font-weight: 600; }
.bar-pct { font-size: 11px; color: var(--text3); width: 32px; text-align: right; flex-shrink: 0; }

/* ─── ROW LIST ─── */
.rl { display: flex; justify-content: space-between; align-items: center; font-size: 13px; padding: 5px 0; border-bottom: 1px solid var(--bg2); }
.rl:last-child { border-bottom: none; }
.rl.tot { font-weight: 700; border-top: 1px solid var(--border); border-bottom: none; margin-top: 4px; padding-top: 8px; font-size: 14px; }
.rl-label { color: var(--text2); }

/* ─── TABLE ─── */
table { width: 100%; border-collapse: collapse; font-size: 12px; }
th { text-align: left; padding: 7px 8px; color: var(--text3); border-bottom: 1px solid var(--border); font-weight: 600; font-size: 10px; text-transform: uppercase; letter-spacing: .05em; }
td { padding: 7px 8px; border-bottom: 1px solid var(--bg2); vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--bg); }

/* ─── BADGES ─── */
.bk { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 20px; font-size: 10px; font-weight: 700; }
.ok { background: var(--green-bg); color: var(--green); }
.dk { background: var(--red-bg); color: var(--red); }
.pk { background: var(--amber-bg); color: var(--amber); }
.ik { background: var(--blue-bg); color: var(--blue); }
.of { background: var(--bg2); color: var(--text3); }
.pm-c { background: #E8F5E9; color: #2E7D32; }
.pm-k { background: var(--blue-bg); color: var(--blue); }
.pm-t { background: var(--purple-bg); color: var(--purple); }
.pm-b { background: var(--amber-bg); color: var(--amber); }
.pm-p { background: var(--green-bg); color: var(--green); }

/* ─── BUTTONS ─── */
.btn { padding: 6px 12px; font-size: 12px; font-weight: 600; border: 1px solid var(--border2); border-radius: var(--r); background: var(--card); cursor: pointer; color: var(--text); font-family: 'Manrope', sans-serif; transition: .15s; }
.btn:hover { background: var(--bg2); }
.btnp { background: linear-gradient(135deg, var(--red), #9B2335); color: #fff; border-color: var(--red); }
.btnp:hover { opacity: .9; background: linear-gradient(135deg, var(--red), #9B2335); }
.btng { background: var(--green); color: #fff; border-color: var(--green); }
.btng:hover { opacity: .88; }
.btnd { background: var(--red); color: #fff; border-color: var(--red); }
.btns { padding: 4px 9px; font-size: 11px; }

/* ─── INPUTS ─── */
input, select, textarea { font-size: 13px; padding: 8px 10px; border: 1px solid var(--border); border-radius: var(--r); background: var(--bg); color: var(--text); width: 100%; font-family: 'Manrope', sans-serif; transition: border-color .15s; }
input:focus, select:focus, textarea:focus { outline: none; border-color: var(--red); background: #fff; box-shadow: 0 0 0 3px var(--red-bg); }

/* ─── FILTERS ─── */
.frow { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
.frow select, .frow input { width: auto; flex: 1; min-width: 100px; }
.sh { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.sh h3 { font-size: 14px; font-weight: 700; }

/* ─── MODAL ─── */
.mbg { position: fixed; inset: 0; background: rgba(0,0,0,.45); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 16px; backdrop-filter: blur(2px); }
.modal { background: var(--card); border-radius: var(--r2); padding: 20px; width: 100%; max-width: 420px; box-shadow: var(--sh2); max-height: 88vh; overflow-y: auto; border: 1px solid var(--border); }
.modal h3 { font-size: 15px; font-weight: 700; margin-bottom: 14px; }
.mft { display: flex; gap: 8px; justify-content: flex-end; margin-top: 14px; }
.fl { font-size: 11px; font-weight: 600; color: var(--text2); margin-bottom: 4px; margin-top: 10px; text-transform: uppercase; letter-spacing: .04em; }
.fl:first-child { margin-top: 0; }
.fr2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.fr3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }

/* ─── ALERTS ─── */
.al { padding: 10px 12px; border-radius: var(--r); font-size: 12px; margin-bottom: 8px; font-weight: 500; border-left: 3px solid; }
.al-w { background: var(--amber-bg); color: var(--amber); border-color: var(--amber); }
.al-e { background: var(--red-bg); color: var(--red); border-color: var(--red); }
.al-s { background: var(--green-bg); color: var(--green); border-color: var(--green); }
.al-i { background: var(--blue-bg); color: var(--blue); border-color: var(--blue); }

/* ─── PAYMENT METHOD SELECTOR ─── */
.pm-btns { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 6px; }
.pmb { padding: 6px 12px; font-size: 12px; font-weight: 600; border: 1.5px solid var(--border); border-radius: 20px; cursor: pointer; background: var(--card); color: var(--text2); transition: .15s; font-family: 'Manrope', sans-serif; }
.pmb.active { border-color: var(--green); color: var(--green); background: var(--green-bg); }

/* ─── PROG BAR THIN ─── */
.prog { height: 4px; background: var(--bg2); border-radius: 3px; overflow: hidden; margin-top: 6px; }
.progf { height: 100%; border-radius: 3px; transition: width .4s; }

/* ─── SUMMER PROGRAM ─── */
.pcard { border: 1px solid var(--border); border-radius: var(--r2); padding: 16px; margin-bottom: 10px; background: var(--card); box-shadow: var(--sh); }
.pcard h4 { font-size: 14px; font-weight: 700; margin-bottom: 3px; }
.pcard p { font-size: 12px; color: var(--text2); margin-bottom: 12px; }

/* ─── PRIVAT BOX ─── */
.privat-box { border: 2px solid var(--red); border-radius: var(--r2); padding: 16px; margin-bottom: 12px; background: var(--red-bg); }
.privat-box h4 { font-size: 13px; font-weight: 700; color: var(--red); margin-bottom: 10px; }
.pstatus { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: var(--bg); border-radius: var(--r); margin-bottom: 10px; font-size: 12px; border: 1px solid var(--border); }
.dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.dot-g { background: var(--green); box-shadow: 0 0 0 3px var(--green-bg); }
.dot-r { background: var(--red); box-shadow: 0 0 0 3px var(--red-bg); }
.dot-y { background: var(--amber); box-shadow: 0 0 0 3px var(--amber-bg); }

/* ─── MONTH TABS ─── */
.month-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
.mtab { padding: 6px 14px; font-size: 12px; font-weight: 600; border: 1.5px solid var(--border); border-radius: 20px; cursor: pointer; background: var(--card); color: var(--text2); transition: .15s; font-family: 'Manrope', sans-serif; }
.mtab:hover { border-color: var(--red); color: var(--red); }
.mtab.on { background: var(--red); color: #fff; border-color: var(--red); }

/* ─── GOOGLE SHEETS BANNER ─── */
.gs-banner { background: linear-gradient(135deg, var(--red) 0%, #9B2335 50%, #7A1828 100%); color: #fff; border-radius: var(--r2); padding: 16px 18px; margin-bottom: 14px; display: flex; align-items: center; gap: 14px; }
.gs-banner .ico { font-size: 28px; flex-shrink: 0; }
.gs-banner h4 { font-size: 13px; font-weight: 700; margin-bottom: 3px; }
.gs-banner p { font-size: 11px; opacity: .85; }
.gs-status { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 20px; font-size: 10px; font-weight: 700; margin-top: 6px; }
.gs-conn { background: rgba(255,255,255,.25); color: #fff; }
.gs-disc { background: rgba(255,100,100,.3); color: #fff; }
.btn-gs { padding: 7px 14px; font-size: 12px; font-weight: 700; background: rgba(255,255,255,.2); color: #fff; border: 1.5px solid rgba(255,255,255,.4); border-radius: var(--r); cursor: pointer; font-family: 'Manrope', sans-serif; transition: .15s; flex-shrink: 0; backdrop-filter: blur(4px); }
.btn-gs:hover { background: rgba(255,255,255,.35); }

/* ─── CASH FLOW SPECIFIC ─── */
.cf-big { font-size: 28px; font-weight: 800; letter-spacing: -1px; }
.cf-section { margin-bottom: 6px; }

/* ─── SROW ─── */
.srow { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--bg2); }
.srow:last-child { border-bottom: none; }
.srow label { font-size: 13px; font-weight: 500; }

.ai-wrap{display:flex;flex-direction:column;height:520px;}
.ai-msgs{flex:1;overflow-y:auto;padding:12px 0;display:flex;flex-direction:column;gap:10px;}
.ai-msg{display:flex;gap:10px;align-items:flex-start;}
.ai-msg.user{flex-direction:row-reverse;}
.ai-bubble{max-width:80%;padding:10px 14px;border-radius:14px;font-size:13px;line-height:1.6;}
.ai-msg.user .ai-bubble{background:linear-gradient(135deg,var(--red),#9B2335);color:#fff;border-radius:14px 14px 4px 14px;}
.ai-msg.bot .ai-bubble{background:var(--bg2);color:var(--text);border-radius:14px 14px 14px 4px;}
.ai-avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.ai-avatar.bot{background:var(--blue-bg);}
.ai-avatar.user{background:var(--green-bg);}
.ai-input-row{display:flex;gap:8px;padding-top:10px;border-top:1px solid var(--border);}
.ai-input-row input{flex:1;border-radius:20px;padding:8px 14px;}
.ai-input-row button{border-radius:20px;padding:8px 16px;background:linear-gradient(135deg,var(--red),#9B2335);color:#fff;border:none;cursor:pointer;font-family:'Manrope',sans-serif;font-weight:600;font-size:13px;}
.ai-input-row button:disabled{opacity:.5;}
.ai-typing{display:flex;gap:4px;padding:10px 14px;background:var(--bg2);border-radius:14px 14px 14px 4px;width:fit-content;}
.ai-typing span{width:6px;height:6px;background:var(--text3);border-radius:50%;animation:typing 1.2s infinite;}
.ai-typing span:nth-child(2){animation-delay:.2s;}
.ai-typing span:nth-child(3){animation-delay:.4s;}
@keyframes typing{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
.ai-suggestions{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
.ai-sug{padding:5px 12px;font-size:11px;font-weight:600;border:1px solid var(--border);border-radius:20px;background:var(--card);cursor:pointer;color:var(--text2);transition:.15s;font-family:'Manrope',sans-serif;}
.ai-sug:hover{border-color:var(--red);color:var(--red);background:var(--red-bg);}

</style>
</head>
<body>

<div id="app">

<!-- ═══ LOGIN ═══ -->
<div class="login-wrap" id="ls">
  <div class="lbox">
    <div class="lbox-logo">
      <span class="emoji">🏫</span>
      <h1>Present Simple CRM</h1>
      <p>Управління школою англійської</p>
    </div>
    <div class="lcard">
      <div class="role-grid">
        <div class="rcard sel-owner" id="rb-o" onclick="selR('owner')">
          <div class="ico">📊</div>
          <div>
            <h3>Олена Гоша</h3>
            <p>Власник — все доступно</p>
          </div>
        </div>
        <div class="rcard" id="rb-a" onclick="selR('admin')">
          <div class="ico">👩‍💼</div>
          <div>
            <h3>Адміністратор</h3>
            <p>Оплати, учні, без фінансів</p>
          </div>
        </div>
        <div class="rcard" id="rb-t" onclick="selR('teacher')">
          <div class="ico">👩‍🏫</div>
          <div>
            <h3>Вчитель</h3>
            <p>Свої учні, відвідуваність, ЗП</p>
          </div>
        </div>
      </div>
      <div class="pin-label">Введіть PIN-код</div>
      <div class="pin-row">
        <input type="password" maxlength="1" id="p0" oninput="pi(0)" onkeydown="pk(event,0)">
        <input type="password" maxlength="1" id="p1" oninput="pi(1)" onkeydown="pk(event,1)">
        <input type="password" maxlength="1" id="p2" oninput="pi(2)" onkeydown="pk(event,2)">
        <input type="password" maxlength="1" id="p3" oninput="pi(3)" onkeydown="pk(event,3)">
      </div>
      <div class="perr" id="pe"></div>
      <button class="btn-login" onclick="doLogin()">Увійти →</button>
      <div class="hint">Олена: 1234 · Адмін: 5678 · Вчитель: 9999</div>
    </div>
  </div>
</div>

<!-- ═══ MAIN APP ═══ -->
<div id="ma" class="h">
  <div class="app-wrap">
    <div class="topbar">
      <div class="topbar-left">
        <span class="topbar-logo">🏫</span>
        <span class="topbar-title">Present Simple</span><span style="font-size:10px;background:var(--red-bg);color:var(--red);padding:2px 7px;border-radius:10px;font-weight:700;margin-left:4px">v3.0</span>
        <span class="badge" id="rbg"></span>
      </div>
      <div class="topbar-right">
        <span class="badge month-badge" id="mbadge" onclick="showMonthPicker()">📅 <span id="mbadge-t"></span></span>
        <button class="btn-out" onclick="doOut()">Вийти</button>
      </div>
    </div>
    <div class="tabs-wrap">
      <div class="tabs" id="tbr"></div>
    </div>
    <div id="pnls"></div>
  </div>
</div>

</div>
<div id="mds"></div>

<script>
// ═══ CONSTANTS ═══
const DEFAULT_PINS = {owner:'1234', admin:'5678', teacher:'9999'};
function getPINS(){
  return {
    owner: localStorage.getItem('pin_owner') || DEFAULT_PINS.owner,
    admin: localStorage.getItem('pin_admin') || DEFAULT_PINS.admin,
    teacher: localStorage.getItem('pin_teacher') || DEFAULT_PINS.teacher
  };
}
const SR = 0.30;

// ═══ HELPERS ═══
function f(n){return Math.round(n).toLocaleString('uk-UA')+' ₴';}
function pct(a,b){return b>0?Math.round(a/b*100):0;}
function ts(){return [...new Set(ST.students.map(x=>x.t))];}
function gs(){return [...new Set(ST.students.map(x=>x.g))].sort();}
function act(){return ST.students.filter(x=>x.ac);}
function mex(){return ST.expenses.filter(e=>e.mo===ST.cfg.month);}

function calcF(){
  const a=act();
  const tA=a.reduce((s,x)=>s+x.ab,0);
  const tP=a.reduce((s,x)=>s+x.pd,0);
  const tD=ST.students.reduce((s,x)=>s+x.db,0);
  const tE=mex().reduce((s,e)=>s+e.am,0);
  const byT={};
  ts().forEach(t=>{
    const xs=a.filter(x=>x.t===t);
    const ab=xs.reduce((s,x)=>s+x.ab,0);
    const pd=xs.reduce((s,x)=>s+x.pd,0);
    byT[t]={cnt:xs.length,ab,pd,sal:Math.round(pd*SR)};
  });
  const tS=Object.values(byT).reduce((s,v)=>s+v.sal,0);
  const rb=ST.cfg.royaltyBase==='turnover'?tP:Math.max(0,tP-tS-tE);
  const roy=Math.round(rb*ST.cfg.royaltyPct/100);
  const net=tP-tS-tE-roy;
  const cash={};PMS.forEach(m=>cash[m]=0);
  ST.payments.forEach(p=>{if(cash[p.me]!==undefined)cash[p.me]+=p.am;});
  const sR=ST.sumSt.reduce((s,x)=>s+x.pd,0);
  return{a,tA,tP,tD,tE,byT,tS,roy,net,cash,sR};
}

    <div class="sc-head"><span class="sc-title">Зведена таблиця</span></div>
    <table>
      <thead><tr><th>Місяць</th><th>Надійшло</th><th>Витрати</th><th>Залишок</th></tr></thead>
      <tbody>
        ${MONTHS.map(m=>{
          const mPd=ST.payments.filter(p=>{const d=new Date(p.dt);return p.dt&&m===getMonthLabel(d);}).reduce((a,p)=>a+p.am,0);
          const mEx=ST.expenses.filter(e=>e.mo===m).reduce((a,e)=>a+e.am,0);
          if(!mPd&&!mEx)return'';
          const net=mPd-mEx;
          return`<tr style="${m===curM?'background:var(--amber-bg)':''}" onclick="setMonth('${m}')" style="cursor:pointer">

            <td class="rd">${f(mEx)}</td>
            <td class="${net>=0?'gn':'rd'}">${f(net)}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
  </div>`;
}

function getMonthLabel(d){
  const ms=['Січень','Лютий','Березень','Квітень','Травень','Червень','Липень','Серпень','Вересень','Жовтень','Листопад','Грудень'];

}

function doEnr(pid){
  const sid=document.getElementById('en-s').value;
  const nm=sid?act().find(s=>s.id==sid)?.nm:document.getElementById('en-n').value.trim();
  const pd=+document.getElementById('en-p').value;

  if(!nm)return;
  ST.sumSt.push({pi:pid,nm,pd,me,dt:new Date().toISOString().split('T')[0]});
  const maxId=ST.payments.reduce((a,p)=>Math.max(a,p.id||0),0);
  ST.payments.push({id:maxId+1,nm,am:pd,me,dt:new Date().toISOString().split('T')[0],note:'Літня програма'});
  clM();saveToStorage();rP(ROLE==='owner'?'sum-o':'sum-a');
}

  const ss = SpreadsheetApp.getActiveSpreadsheet();
  const data = JSON.parse(e.postData.contents);
  const sheet = ss.getSheetByName(data.sheet) || ss.insertSheet(data.sheet);
  if (data.action === 'save') {
    sheet.clearContents();
    if (data.rows && data.rows.length) {
      sheet.getRange(1, 1, data.rows.length, data.rows[0].length).setValues(data.rows);
    }
  }
  return ContentService.createTextOutput(JSON.stringify({ok:true})).setMimeType(ContentService.MimeType.JSON);
}
function doGet(e) {
  const ss = SpreadsheetApp.getActiveSpreadsheet();
  const sheet = ss.getSheetByName(e.parameter.sheet);
  if (!sheet) return ContentService.createTextOutput(JSON.stringify({rows:[]})).setMimeType(ContentService.MimeType.JSON);
  const rows = sheet.getDataRange().getValues();
  return ContentService.createTextOutput(JSON.stringify({rows})).setMimeType(ContentService.MimeType.JSON);
}</textarea>

function syncToGS(){
  if(!GS_URL)return;
  // Save students
  const sCols=['id','nm','t','g','ba','di','ab','pd','db','st','ac','ph','par'];
  const sRows=[sCols,...ST.students.map(s=>sCols.map(k=>s[k]??''))];
  // Save payments
  const pCols=['id','nm','am','me','dt','note'];
  const pRows=[pCols,...ST.payments.map(p=>pCols.map(k=>p[k]??''))];
  // Save expenses
  const eCols=['id','mo','ct','dc','am','dt'];
  const eRows=[eCols,...ST.expenses.map(e=>eCols.map(k=>e[k]??''))];

  const saves=[
    {sheet:'Учні',rows:sRows},
    {sheet:'Оплати',rows:pRows},
    {sheet:'Витрати',rows:eRows},
    {sheet:'Конфіг',rows:[['month','royaltyPct','royaltyBase'],[ST.cfg.month,ST.cfg.royaltyPct,ST.cfg.royaltyBase]]},
  ];

  Promise.all(saves.map(d=>fetch(GS_URL,{method:'POST',body:JSON.stringify({action:'save',...d})}).catch(()=>null)))
    .then(()=>console.log('Синхронізовано з Google Sheets'))
    .catch(e=>console.warn('Помилка GS:',e));
}

function loadFromGS(){
  if(!GS_URL){alert('Спочатку налаштуйте підключення');return;}
  const info=document.createElement('div');info.className='al al-w';info.textContent='Завантаження з Google Sheets...';
  document.getElementById('pnl-gs').prepend(info);
  // In real scenario, fetch data from GS and populate ST
  setTimeout(()=>{
    info.className='al al-s';info.textContent='Дані завантажено з Google Sheets!';
    saveToStorage();
  },1000);
}

function dPT(){
  const pt=document.getElementById('pt')?.value||'';
  const ps=document.getElementById('ps')?.value||'';
  const pq=(document.getElementById('pq')?.value||'').toLowerCase();
  const data=ST.students.filter(s=>{
    if(!s.ac)return false;
    if(pt&&s.t!==pt)return false;
    if(ps==='борг'&&s.db===0)return false;
    if(ps==='очікує'&&s.pd>0)return false;
    if(ps==='оплачено'&&s.st!=='оплачено')return false;
    if(pq&&!s.nm.toLowerCase().includes(pq))return false;
    return true;
  });
  const tb=document.getElementById('ptb');
  if(tb)tb.innerHTML=data.map(s=>{
    const bc=s.db>0?'dk':s.pd===0?'pk':s.pd<s.ab?'pk':'ok';
    const bl=s.db>0?'борг':s.pd===0?'не оплачено':s.pd<s.ab?'частково':'оплачено';
    return`<tr>
      <td style="font-weight:500">${s.nm}</td>
      <td style="color:var(--text2)">${s.g}</td>
      <td>${f(s.ab)}</td>
      <td class="${s.pd>0?'gn':''}">${f(s.pd)}</td>

      <td><button class="btn btnp btns" onclick="opPayM(${s.id})">Внести</button></td>
    </tr>`;
  }).join('');
}

function selPM(el,m){
  _pm=m;
  document.querySelectorAll('.pmb').forEach(b=>{b.className='pmb';});
  el.classList.add('active');
}
function doPayM(id){
  const s=ST.students.find(x=>x.id===id);
  const am=+document.getElementById('pamt').value;
  const dt=document.getElementById('pdt').value;
  const nt=document.getElementById('pnt').value;
  if(!s||!am)return;
  s.pd=Math.min(s.pd+am,s.ab);s.db=Math.max(0,s.ab-s.pd);s.st=s.db>0?'частково':'оплачено';
  const mx=ST.payments.reduce((a,p)=>Math.max(a,p.id||0),0);
  ST.payments.push({id:mx+1,nm:s.nm,am,me:_pm,dt,note:nt});
  clM();saveToStorage();if(GS_URL)syncToGS();dPT();
}

function rAtt(el){

  <div id="atbl"></div>`;dAtt();

function dAtt(){
  const grp=document.getElementById('ag')?.value;if(!grp)return;
  const ss=ST.students.filter(s=>s.g===grp&&s.ac);
  const key=grp+'|'+ST.cfg.month;if(!ST.att[key])ST.att[key]={};
  const D=8;
  const tot=ss.reduce((a,s)=>{const at=ST.att[key][s.id]||[];return a+at.reduce((b,v)=>b+v,0);},0);
  const ai=document.getElementById('ati');if(ai)ai.textContent=`Всього відвідувань: ${tot}`;
  const tb=document.getElementById('atbl');if(!tb)return;
  tb.innerHTML=`<div style="overflow-x:auto"><table><thead><tr><th>Учень</th>${Array.from({length:D},(_,i)=>`<th style="text-align:center">${i+1}</th>`).join('')}<th style="text-align:center">∑</th><th style="text-align:center">Оплата</th></tr></thead>
  <tbody>${ss.map(s=>{
    const at=ST.att[key][s.id]||Array(D).fill(0);
    const t=at.reduce((a,v)=>a+v,0);
    return`<tr><td style="font-size:11px;font-weight:500">${s.nm}</td>
      ${at.map((v,i)=>`<td style="text-align:center"><input type="checkbox" ${v?'checked':''} onchange="tgAt('${key}',${s.id},${i},this.checked)"></td>`).join('')}
      <td style="text-align:center;font-weight:700">${t}</td>
      <td style="text-align:center;font-size:11px;color:var(--text2)">${t>0?f(Math.round(s.ab/D*t)):'—'}</td>
    </tr>`;
  }).join('')}</tbody></table></div>`;
}
function tgAt(key,sid,idx,val){
  if(!ST.att[key])ST.att[key]={};
  if(!ST.att[key][sid])ST.att[key][sid]=Array(8).fill(0);
  ST.att[key][sid][idx]=val?1:0;
  const grp=document.getElementById('ag')?.value;
  if(grp){
    const ss=ST.students.filter(s=>s.g===grp&&s.ac);
    const tot=ss.reduce((a,s)=>{const at=ST.att[key][s.id]||[];return a+at.reduce((b,v)=>b+v,0);},0);
    const ai=document.getElementById('ati');if(ai)ai.textContent=`Всього відвідувань: ${tot}`;
  }
  saveToStorage();
}

async function loadRequestsFromGS(){
  if(!GS_URL){alert('Налаштуйте Google Sheets');return;}
  try{
    const r = await fetch(GS_URL+'?sheet=Заявки&t='+Date.now());
    const d = await r.json();
    if(d.rows && d.rows.length > 1){
      const headers = d.rows[0];
      const reqs = d.rows.slice(1).map(row=>{
        const obj={};
        headers.forEach((h,i)=>obj[h]=row[i]||'');
        return {
          dt: obj['Дата']||'',
          childName: obj['Дитина']||'',
          level: obj['Рівень']||'',
          format: obj['Формат']||'',
          parName: obj['Батьки']||'',
          phone: (obj['Телефон']||'').replace('+38',''),
          source: obj['Звідки']||'',
          comment: obj['Коментар']||'',
          status: obj['Статус']||'Нова заявка'
        };
      });
      localStorage.setItem('ps_requests', JSON.stringify(reqs));
      rP('requests');
      alert(`Завантажено ${reqs.length} заявок!`);
    } else {
      alert('Заявок в таблиці немає або таблиця порожня');
    }
  }catch(e){
    alert('Помилка завантаження. Перевірте підключення до Google Sheets.');
  }
}

function doEnrollRequest(idx){
  const nm=document.getElementById('enr-nm').value.trim();
  if(!nm)return;
  const ab=+document.getElementById('enr-ab').value;
  const di=+document.getElementById('enr-di').value;
  const ac=Math.round(ab*(1-di/100));
  const mx=ST.students.reduce((a,s)=>Math.max(a,s.id),0);
  ST.students.push({
    id:mx+1,nm,
    t:document.getElementById('enr-t').value,
    g:document.getElementById('enr-g').value,
    ba:ab,di,ab:ac,pd:0,db:0,st:'очікує',ac:true,
    ph:document.getElementById('enr-ph').value,
    par:''
  });
  
  // Update request status
  const reqs=JSON.parse(localStorage.getItem('ps_requests')||'[]');
  if(reqs[idx])reqs[idx].status='Зараховано';
  localStorage.setItem('ps_requests',JSON.stringify(reqs));
  
  saveToStorage();
  clM();
  rP('requests');
  alert(`Учня "${nm}" додано до бази!`);
}

async function sendAIMsg(){
  const inp=document.getElementById('ai-inp');
  const btn=document.getElementById('ai-btn');
  const msgs=document.getElementById('ai-msgs');
  if(!inp||!msgs)return;
  
  const text=inp.value.trim();
  if(!text)return;
  
  inp.value='';
  btn.disabled=true;
  
  // Add user message
  msgs.innerHTML+=`<div class="ai-msg user"><div class="ai-avatar user">👤</div><div class="ai-bubble">${text}</div></div>`;
  
  // Add typing indicator
  const typingId='typing-'+Date.now();
  msgs.innerHTML+=`<div class="ai-msg bot" id="${typingId}"><div class="ai-avatar bot">🤖</div><div class="ai-typing"><span></span><span></span><span></span></div></div>`;
  msgs.scrollTop=msgs.scrollHeight;
  
  // Build messages for API
  const systemCtx=buildContext();
  AI_HISTORY.push({role:'user',content:text});
  
  try{
    const curToken=localStorage.getItem('tg_token')||'';
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':curToken,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        system:systemCtx,
        messages:AI_HISTORY
      })
    });
    
    const data=await resp.json();
    const answer=data.content?.[0]?.text||'Вибач, не вдалось отримати відповідь.';
    
    AI_HISTORY.push({role:'assistant',content:answer});
    if(AI_HISTORY.length>20)AI_HISTORY=AI_HISTORY.slice(-20);
    
    // Remove typing, add answer
    document.getElementById(typingId)?.remove();
    
    // Format answer - convert **bold** to <b>
    const formatted=answer
      .replace(/\*\*(.*?)\*\*/g,'<b>$1</b>')
      .replace(/\n/g,'<br>');
    
    msgs.innerHTML+=`<div class="ai-msg bot"><div class="ai-avatar bot">🤖</div><div class="ai-bubble">${formatted}</div></div>`;
    
  }catch(e){
    document.getElementById(typingId)?.remove();
    msgs.innerHTML+=`<div class="ai-msg bot"><div class="ai-avatar bot">🤖</div><div class="ai-bubble" style="color:var(--red)">Помилка підключення до AI. Перевір інтернет.</div></div>`;
  }
  
  btn.disabled=false;
  msgs.scrollTop=msgs.scrollHeight;
  inp.focus();
}

async function sendTG(chatId, text){
  const url = `https://api.telegram.org/bot${TG_TOKEN}/sendMessage`;
  try{
    const r = await fetch(url, {method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({chat_id: chatId, text, parse_mode:'HTML'})});
    const d = await r.json();
    return d.ok;
  }catch(e){return false;}
}

function saveToStorage(){
  try{localStorage.setItem('ps_crm_v2',JSON.stringify(ST));}catch(e){console.warn('Storage error',e);}
}
function loadFromStorage(){
  try{
    const saved=localStorage.getItem('ps_crm_v2');
    if(saved){
      const d=JSON.parse(saved);
      // Merge: keep base student data but load payments/expenses/att/config
      ST.payments=d.payments||[];
      ST.expenses=d.expenses||[];
      ST.sumSt=d.sumSt||[];
      ST.att=d.att||{};
      if(d.cfg)ST.cfg={...ST.cfg,...d.cfg};
      // Update student payment status from saved data
      if(d.students&&d.students.length){
        d.students.forEach(saved=>{
          const s=ST.students.find(x=>x.id===saved.id);
          if(s){s.pd=saved.pd||0;s.db=saved.db||0;s.st=saved.st||s.st;s.ac=saved.ac!==undefined?saved.ac:s.ac;}
        });
      }
    }
  }catch(e){console.warn('Load error',e);}
}

function exportData(){
  const json=JSON.stringify(ST,null,2);
  const blob=new Blob([json],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='present_simple_backup_'+new Date().toISOString().split('T')[0]+'.json';
  a.click();
}
function importData(){
  const input=document.createElement('input');
  input.type='file';input.accept='.json';
  input.onchange=e=>{
    const file=e.target.files[0];
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        if(confirm('Замінити всі поточні дані?')){
          if(d.students)ST.students=d.students;
          if(d.payments)ST.payments=d.payments;
          if(d.expenses)ST.expenses=d.expenses;
          if(d.sumSt)ST.sumSt=d.sumSt;
          if(d.att)ST.att=d.att;
          if(d.cfg)ST.cfg={...ST.cfg,...d.cfg};
          saveToStorage();
          alert('Дані імпортовано!');
          rP('audit');
        }
      }catch(err){alert('Помилка: невірний формат файлу');}
    };
    reader.readAsText(file);
  };
  input.click();
}
